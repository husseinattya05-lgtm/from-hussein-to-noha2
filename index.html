<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Memory Game </title>

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;

  background: radial-gradient(circle at top, #1a0033, #050014);
  color: #b388ff;

  font-family: monospace;
  overflow: hidden;
  transition: background 1.2s ease;
}

.container {
  text-align: center;
  max-width: 650px;
  padding: 20px;
}

#text {
  font-size: 20px;
  line-height: 1.8;
  min-height: 120px;
  white-space: pre-line;
  text-shadow: 0 0 15px rgba(179,136,255,0.6);
}

button {
  margin-top: 20px;
  padding: 12px 25px;
  border: none;
  background: #7c4dff;
  color: white;
  font-weight: bold;
  cursor: pointer;
  border-radius: 25px;
}

button:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

img {
  max-width: 85%;
  border-radius: 15px;
  margin-top: 20px;
  animation: pop 1s ease;
  box-shadow: 0 0 25px rgba(124,77,255,0.4);
}

@keyframes pop {
  from {opacity: 0; transform: scale(0.9);}
  to {opacity: 1; transform: scale(1);}
}
</style>

</head>

<body>

<!--  Music -->
<audio id="bgm" src="music.mp3" loop></audio>

<div class="container">
  <div id="text">Loaded: Memory Game </div>
  <div id="image"></div>
  <button id="btn" onclick="next()">Start</button>
</div>

<script>
let step = 0;
let typing = false;

const text = document.getElementById("text");
const image = document.getElementById("image");
const btn = document.getElementById("btn");

//  typing effect (safe)
function typeWriter(msg, i = 0) {
  typing = true;
  btn.disabled = true;

  text.innerHTML = "";

  function write() {
    if (i < msg.length) {
      text.innerHTML += msg.charAt(i);
      i++;
      setTimeout(write, 65); // smooth speed
    } else {
      typing = false;
      btn.disabled = false;
    }
  }

  write();
}

//  pause helper
function pause(ms) {
  return new Promise(res => setTimeout(res, ms));
}

async function next() {
  if (typing) return;

  step++;

  // 1
  if (step === 1) {
    const music = document.getElementById("bgm");
    music.volume = 0.4;
    music.play();

    typeWriter("Loading memory... ");
    image.innerHTML = "";
  }

  // 2
  else if (step === 2) {
    typeWriter("Best moment captured ");
    image.innerHTML = "<img src='us.jpg'>";
  }

  // 3 (FIXED: no overlap bug)
  else if (step === 3) {
    typeWriter("Boss Fight - Who won?");
    image.innerHTML = "<img src='game.jpg'>";

    setTimeout(async () => {
      await pause(1200);
      typeWriter("You win… always ");
    }, 1400);
  }

  // 4
  else if (step === 4) {
    document.body.style.background =
      "radial-gradient(circle at bottom, #0a001a, #000)";

    typeWriter("Honestly… that loss was worth it ");
    image.innerHTML = "";
  }

  // 5
  else if (step === 5) {
    await pause(700);
    typeWriter("Maybe it was just a night at an event…");
  }

  // 6
  else if (step === 6) {
    await pause(700);
    typeWriter("But you turned it into a memory I will never forget ");
  }

  // 7
  else if (step === 7) {
    typeWriter("Game Over…");
  }

  // 8
  else if (step === 8) {
    await pause(700);
    typeWriter("But I still want to play every moment of my life with you ");
  }
}
</script>

</body>
</html>
